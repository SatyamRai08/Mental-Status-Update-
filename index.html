<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mental Health Checker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center px-4 py-10">
  <div class="bg-gray-900 p-8 rounded-3xl w-full max-w-6xl shadow-2xl border border-gray-800">
    <h1 class="text-4xl font-bold text-center text-purple-300 mb-4">Mental Health Checker</h1>
    <p class="text-center text-gray-400 mb-10 italic text-lg">Answer honestly to understand how you're feeling lately.</p>

    <form id="healthForm" class="space-y-8">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
        <!-- Question 1 -->
        <div>
          <label class="block mb-3 text-lg text-purple-200">1. Do you feel happy most days?</label>
          <div class="flex flex-wrap gap-4">
            <label class="option"><input type="radio" name="q1" value="0"/> Always</label>
            <label class="option"><input type="radio" name="q1" value="1"/> Sometimes</label>
            <label class="option"><input type="radio" name="q1" value="2"/> Rarely</label>
            <label class="option"><input type="radio" name="q1" value="3"/> Never</label>
          </div>
        </div>
        <!-- Repeat for 9 more questions -->
        <div>
          <label class="block mb-3 text-lg text-purple-200">2. Do you often feel tired even after resting?</label>
          <div class="flex flex-wrap gap-4">
            <label class="option"><input type="radio" name="q2" value="0"/> Never</label>
            <label class="option"><input type="radio" name="q2" value="1"/> Rarely</label>
            <label class="option"><input type="radio" name="q2" value="2"/> Sometimes</label>
            <label class="option"><input type="radio" name="q2" value="3"/> Often</label>
          </div>
        </div>
        <div>
          <label class="block mb-3 text-lg text-purple-200">3. Do you have trouble sleeping?</label>
          <div class="flex flex-wrap gap-4">
            <label class="option"><input type="radio" name="q3" value="0"/> Never</label>
            <label class="option"><input type="radio" name="q3" value="1"/> Rarely</label>
            <label class="option"><input type="radio" name="q3" value="2"/> Sometimes</label>
            <label class="option"><input type="radio" name="q3" value="3"/> Often</label>
          </div>
        </div>
        <div>
          <label class="block mb-3 text-lg text-purple-200">4. Do you feel anxious or worried?</label>
          <div class="flex flex-wrap gap-4">
            <label class="option"><input type="radio" name="q4" value="0"/> Never</label>
            <label class="option"><input type="radio" name="q4" value="1"/> Sometimes</label>
            <label class="option"><input type="radio" name="q4" value="2"/> Often</label>
            <label class="option"><input type="radio" name="q4" value="3"/> Always</label>
          </div>
        </div>
        <div>
          <label class="block mb-3 text-lg text-purple-200">5. Do you find it hard to concentrate?</label>
          <div class="flex flex-wrap gap-4">
            <label class="option"><input type="radio" name="q5" value="0"/> Never</label>
            <label class="option"><input type="radio" name="q5" value="1"/> Rarely</label>
            <label class="option"><input type="radio" name="q5" value="2"/> Sometimes</label>
            <label class="option"><input type="radio" name="q5" value="3"/> Always</label>
          </div>
        </div>
        <div>
          <label class="block mb-3 text-lg text-purple-200">6. Do you feel overwhelmed by daily tasks?</label>
          <div class="flex flex-wrap gap-4">
            <label class="option"><input type="radio" name="q6" value="0"/> Never</label>
            <label class="option"><input type="radio" name="q6" value="1"/> Rarely</label>
            <label class="option"><input type="radio" name="q6" value="2"/> Often</label>
            <label class="option"><input type="radio" name="q6" value="3"/> Always</label>
          </div>
        </div>
        <div>
          <label class="block mb-3 text-lg text-purple-200">7. Do you avoid social activities?</label>
          <div class="flex flex-wrap gap-4">
            <label class="option"><input type="radio" name="q7" value="0"/> Never</label>
            <label class="option"><input type="radio" name="q7" value="1"/> Sometimes</label>
            <label class="option"><input type="radio" name="q7" value="2"/> Often</label>
            <label class="option"><input type="radio" name="q7" value="3"/> Always</label>
          </div>
        </div>
        <div>
          <label class="block mb-3 text-lg text-purple-200">8. Do you often feel hopeless or down?</label>
          <div class="flex flex-wrap gap-4">
            <label class="option"><input type="radio" name="q8" value="0"/> Never</label>
            <label class="option"><input type="radio" name="q8" value="1"/> Sometimes</label>
            <label class="option"><input type="radio" name="q8" value="2"/> Often</label>
            <label class="option"><input type="radio" name="q8" value="3"/> Always</label>
          </div>
        </div>
        <div>
          <label class="block mb-3 text-lg text-purple-200">9. Do you enjoy things like you used to?</label>
          <div class="flex flex-wrap gap-4">
            <label class="option"><input type="radio" name="q9" value="0"/> Always</label>
            <label class="option"><input type="radio" name="q9" value="1"/> Sometimes</label>
            <label class="option"><input type="radio" name="q9" value="2"/> Rarely</label>
            <label class="option"><input type="radio" name="q9" value="3"/> Never</label>
          </div>
        </div>
        <div>
          <label class="block mb-3 text-lg text-purple-200">10. Do you feel confident about the future?</label>
          <div class="flex flex-wrap gap-4">
            <label class="option"><input type="radio" name="q10" value="0"/> Always</label>
            <label class="option"><input type="radio" name="q10" value="1"/> Sometimes</label>
            <label class="option"><input type="radio" name="q10" value="2"/> Rarely</label>
            <label class="option"><input type="radio" name="q10" value="3"/> Never</label>
          </div>
        </div>
      </div>

      <div class="text-center mt-10">
        <button id="submitBtn" type="submit" class="relative px-12 py-4 rounded-full bg-gradient-to-r from-pink-500 to-purple-700 text-white font-semibold text-xl transition-all duration-300 ease-in-out hover:scale-105 active:scale-95 shadow-2xl shadow-purple-700/40">
          Check Result
        </button>
        <div id="loadingSpinner" class="mt-6 flex-col items-center gap-2 hidden flex">
          <div class="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
          <span class="text-purple-400 text-lg animate-pulse">Analyzing...</span>
        </div>
      </div>
    </form>

    <div id="result" class="mt-10 text-center text-2xl text-purple-300 hidden"></div>
  </div>

  <style>
    .option {
      padding: 0.5rem 1.2rem;
      border-radius: 9999px;
      border: 1px solid #a855f7;
      color: #c084fc;
      cursor: pointer;
      transition: 0.2s;
    }
    .option:hover {
      background-color: #7e22ce;
    }
    .option input {
      display: none;
    }
    .option.selected {
      background-color: #9333ea;
      color: white;
    }
  </style>

  <script>
    document.querySelectorAll('.option').forEach(opt => {
      opt.addEventListener('click', () => {
        const name = opt.querySelector('input').name;
        document.querySelectorAll(`input[name=${name}]`).forEach(i => {
          i.parentElement.classList.remove('selected');
        });
        opt.classList.add('selected');
        opt.querySelector('input').checked = true;
      });
    });

    const form = document.getElementById('healthForm');
    const result = document.getElementById('result');
    const spinner = document.getElementById('loadingSpinner');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      result.classList.add("hidden");
      spinner.classList.remove("hidden");

      setTimeout(() => {
        spinner.classList.add("hidden");
        let total = 0;
        for (let i = 1; i <= 10; i++) {
          const selected = document.querySelector(`input[name="q${i}"]:checked`);
          if (selected) total += parseInt(selected.value);
        }
        let message = "";
        if (total <= 7) {
          message = "You seem to be mentally strong. Keep doing what makes you happy!";
        } else if (total <= 15) {
          message = "You're doing okay, but a little self-care and rest may help.";
        } else if (total <= 22) {
          message = "You're under some stress. Consider talking to someone you trust.";
        } else {
          message = "Please reach out for support. You're not alone, and help is available.";
        }
        result.textContent = message;
        result.classList.remove("hidden");
      }, 2000);
    });
  </script>
</body>
</html>
